services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demoplast
      POSTGRES_USER: demoplast
      POSTGRES_PASSWORD: demoplast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    # Демо за одну команду: собрать Tailwind (dist в .gitignore, host-bind его
    # затирает), наполнить БД демо-заявками, поднять dev-сервер. migrate и
    # collectstatic выполняет entrypoint.sh до этой команды.
    command: >
      sh -c "python manage.py tailwind build &&
             python manage.py seed_demo_leads &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
