services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demoplast
      POSTGRES_USER: demoplast
      POSTGRES_PASSWORD: demoplast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    # Демо за одну команду. migrate + collectstatic выполняет entrypoint.sh до
    # этой команды; здесь — то, что зависит от готовой БД и нужно для демо:
    #   tailwind build   — dist в .gitignore, host-bind его затирает → собираем
    #   seed_demo_images — плейсхолдер-картинки товаров (рабочая карусель)
    #   seed_demo_leads  — фейковые заявки, чтобы админка была не пустой
    # (категории/товары/контакты уже залиты сид-миграциями при migrate)
    command: >
      sh -c "python manage.py tailwind build &&
             python manage.py seed_demo_images &&
             python manage.py seed_demo_leads &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - /app/.venv
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
  media_data:
