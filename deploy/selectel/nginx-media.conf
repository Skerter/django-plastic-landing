server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options nosniff;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # отдаём только /media/ — плейсхолдеры товаров (генерируются seed_demo_images)
    location /media/ {
        alias /srv/media/;
        expires 7d;
        access_log off;
    }

    # всё остальное на этом контейнере не обслуживаем
    location / {
        return 404;
    }
}
