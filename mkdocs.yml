site_name: DemoPlast — Документация
site_description: Сайт-каталог производителя пластиковой тары (Django)
docs_dir: docs
strict: true

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom

nav:
  - Главная: index.md
  - Уроки:
      - Запуск проекта локально: tutorials/getting-started.md
  - Инструкции:
      - Деплой: how-to/deploy.md
      - Эксплуатация: how-to/operations.md
      - Контент через админку: how-to/add-product-via-admin.md
      - Каналы уведомлений: how-to/enable-notification-channels.md
  - Справочник:
      - Переменные окружения: reference/environment.md
      - API и endpoints: reference/api-endpoints.md
      - Модель данных: reference/data-model.md
  - Объяснения:
      - Архитектура: explanation/architecture.md
      - Соответствие 152-ФЗ: explanation/compliance-152fz.md
  - Решения (ADR):
      - Обзор: adr/README.md
      - 0001 Монолит, не микросервисы: adr/0001-monolith-not-microservices.md
      - 0002 Compose, не k8s: adr/0002-compose-not-k8s.md
      - 0003 SSR, не SPA: adr/0003-ssr-not-spa.md
      - 0004 Tailwind сборка, не CDN: adr/0004-tailwind-compiled-not-cdn.md
      - 0005 Заявка пишется в БД первой: adr/0005-write-lead-to-db-first.md
      - 0006 Языковая политика — разделение по аудитории: adr/0006-language-policy.md
