# ── HTTP :80 — ACME-челлендж + редирект на HTTPS ──────────────────────────────
server {
    listen 80;
    server_name demoplast.example;

    # Certbot webroot-челлендж — отдаётся по HTTP, НЕ редиректится.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name demoplast.example;

    ssl_certificate     /etc/letsencrypt/live/demoplast.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demoplast.example/privkey.pem;

    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header X-Robots-Tag "noindex, nofollow" always;   # демо — не индексировать

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        # Docker-DNS резолвит имя web на каждый запрос (valid=10s) — иначе nginx
        # кеширует IP при старте и ловит 502 после пересоздания web при деплое.
        resolver 127.0.0.11 valid=10s;
        set $upstream_web web;
        proxy_pass http://$upstream_web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
